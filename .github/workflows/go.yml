name: Build and Test Go Projects

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Find Go modules
        id: find_modules
        run: |
          modules=$(find . -type f -name "go.mod" -printf '%h\n')
          echo "modules<<EOF" >> $GITHUB_OUTPUT
          echo "$modules" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build & Test each module
        run: |
          echo "Gefundene Go-Module:"
          echo "${{ steps.find_modules.outputs.modules }}"

          modules=$(echo "${{ steps.find_modules.outputs.modules }}" | tr '\n' ' ')
          
          for dir in $modules; do
            echo "--------------------------------------"
            echo "Baue & teste Modul: $dir"
            echo "--------------------------------------"

            cd "$dir"

            go mod tidy
            go build ./...
            go test ./... -v

            cd - >/dev/null
          done
